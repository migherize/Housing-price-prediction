version: '3.8'

services:
  housing_price_prediction:
    container_name: housing_price_prediction
    restart: "always"
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 8080

    volumes:
      - "./ml-house-price/:/app"

    ports:
      - "8080:8080"

    environment:
      - PYTHONPATH=/app:$PYTHONPATH